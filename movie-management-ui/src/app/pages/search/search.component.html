<div class="container mt-4">

  <h2 class="page-title">Search Movies</h2>

  <!-- Search Box -->
  <div class="search-box">

    <div class="radio-group">
      <label>
        <input type="radio" [(ngModel)]="searchBy" value="Title"> Title
      </label>

      <label>
        <input type="radio" [(ngModel)]="searchBy" value="Genres"> Genre
      </label>

      <label>
        <input type="radio" [(ngModel)]="searchBy" value="Year"> Year
      </label>
    </div>

    <div class="search-input-group">
      <input 
        [(ngModel)]="value"
        class="form-control"
        placeholder="Enter search value">

      <button class="btn btn-primary" (click)="search()">
        Search
      </button>
    </div>

  </div>

  <!-- Results -->
  <div class="row mt-4">
    <div class="col-md-3" *ngFor="let movie of movies">

      <div class="movie-card">

        <img [src]="movie.imageUrl" class="movie-img">

        <div class="movie-body">
          <h5 class="movie-title">{{ movie.title }}</h5>
          <p class="movie-genre">{{ movie.genres }}</p>

          <a [routerLink]="['/movie', movie.id]" class="btn btn-sm btn-primary w-100">
            View Details
          </a>
        </div>

      </div>

    </div>
  </div>

</div>
